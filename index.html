<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="ie=edge" http-equiv="X-UA-Compatible">
    <title>New Tab</title>

    <!-- Import Inter Font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Link to the external CSS file -->
    <link href="styles.css" rel="stylesheet">
</head>

<body>
<div class="main">

    <!-- Proton Group -->
    <div class="group" data-label="Proton">
        <a class="link" href="https://mail.proton.me/" data-tooltip="Proton Mail">
            <div class="link-item">
                <img alt="" src="./assets/protonmail.svg"/>
            </div>
        </a>
        <a class="link" href="https://calendar.proton.me/" data-tooltip="Proton Calendar">
            <div class="link-item">
                <img alt="" src="./assets/protoncalendar.svg"/>
            </div>
        </a>
        <a class="link" href="https://drive.proton.me/" data-tooltip="Proton Drive">
            <div class="link-item">
                <img alt="" src="./assets/protondrive.svg"/>
            </div>
        </a>
        <a class="link" href="https://pass.proton.me/" data-tooltip="Proton Pass">
            <div class="link-item">
                <img alt="" src="./assets/protonpass.svg"/>
            </div>
        </a>
        <a class="link" href="https://vpn.proton.me/" data-tooltip="Proton VPN">
            <div class="link-item">
                <img alt="" src="./assets/protonvpn.svg"/>
            </div>
        </a>
        <a class="link" href="https://wallet.proton.me/" data-tooltip="Proton Wallet">
            <div class="link-item">
                <img alt="" src="./assets/protonwallet.svg"/>
            </div>
        </a>
    </div>

    <!-- Row 1 -->
    <div class="row">

        <div class="group" data-label="Art">
            <a class="link" href="https://www.pixiv.net/" data-tooltip="Pixiv">
                <div class="link-item">
                    <img alt="" src="./assets/pixiv.svg"/>
                </div>
            </a>
            <a class="link" href="https://www.instagram.com/" data-tooltip="Instagram">
                <div class="link-item">
                    <img alt="" src="./assets/instagram.svg"/>
                </div>
            </a>
        </div>

        <div class="group" data-label="Office">
            <a class="link" href="https://www.office.com/?auth=2" data-tooltip="MS Office">
                <div class="link-item">
                    <img alt="" src="./assets/office.svg"/>
                </div>
            </a>
        </div>

        <div class="group" data-label="Work">
            <a class="link" href="https://uprisedigital.atlassian.net/" data-tooltip="Uprise Jira">
                <div class="link-item">
                    <img alt="" src="./assets/jira.svg"/>
                </div>
            </a>
            <a class="link" href="https://uprisedigital.atlassian.net/wiki" data-tooltip="Uprise Confluence">
                <div class="link-item">
                    <img alt="" src="./assets/confluence.svg"/>
                </div>
            </a>
            <a class="link" href="https://railway.app/" data-tooltip="Railway">
                <div class="link-item">
                    <img alt="" src="./assets/railway.svg"/>
                </div>
            </a>
            <a class="link" href="https://mail.google.com/mail/u/0/#inbox" data-tooltip="Gmail">
                <div class="link-item">
                    <img alt="" src="./assets/gmail-svgrepo-com.svg"/>
                </div>
            </a>
        </div>

    </div>

    <!-- Row 2 -->
    <div class="row">

        <div class="group" data-label="Professional">
            <a class="link" href="https://www.linkedin.com/" data-tooltip="LinkedIn">
                <div class="link-item">
                    <img alt="" src="./assets/linkedin.svg"/>
                </div>
            </a>
            <a class="link" href="https://github.com/seyone22?tab=repositories" data-tooltip="GitHub Repos">
                <div class="link-item">
                    <img alt="" class="github" src="./assets/github.svg"/>
                </div>
            </a>
        </div>

        <div class="group" data-label="Anime.lk">
            <a class="link" href="https://animelk.atlassian.net/" data-tooltip="Anime.lk Jira">
                <div class="link-item">
                    <img alt="" src="./assets/jira.svg"/>
                </div>
            </a>
            <a class="link" href="https://animelk.atlassian.net/wiki" data-tooltip="Anime.lk Wiki">
                <div class="link-item">
                    <img alt="" src="./assets/confluence.svg"/>
                </div>
            </a>
            <a class="link" href="https://drive.google.com/drive/folders/1TW6OpLOpAr633bVs_GCPWVa7UO-jOQkj"
               data-tooltip="Google Drive">
                <div class="link-item">
                    <img alt="" src="./assets/googledrive.svg"/>
                </div>
            </a>
            <a class="link" href="https://portal.partnerprogram.anime.lk/" data-tooltip="Partner Portal">
                <div class="link-item">
                    <img alt="" src="./assets/animelk.png"/>
                </div>
            </a>
            <a class="link" href="https://dev.anime.lk/" data-tooltip="Dev Anime.lk">
                <div class="link-item">
                    <img alt="" src="./assets/animelk.png"/>
                </div>
            </a>
        </div>

    </div>

    <!-- Row 3 -->
    <div class="row">
        <div class="group" data-label="DSMH | G.W Inno">
            <a class="link" href="https://dsmh.atlassian.net/" data-tooltip="DSMH Jira">
                <div class="link-item">
                    <img alt="" src="./assets/jira.svg"/>
                </div>
            </a>
            <a class="link" href="https://dsmh.atlassian.net/wiki" data-tooltip="DSMH Wiki">
                <div class="link-item">
                    <img alt="" src="./assets/confluence.svg"/>
                </div>
            </a>
        </div>

        <div class="group" data-label="Personal">
            <a class="link" href="https://seyone.dev/" data-tooltip="seyone.dev">
                <div class="link-item">
                    <!-- Placeholder initials logo until you get a real one -->
                    <img alt="" src="https://ui-avatars.com/api/?name=Seyone+Dev&background=random"/>
                </div>
            </a>
            <a class="link" href="https://food.seyone.dev/" data-tooltip="Seyone Food">
                <div class="link-item">
                    <img alt="" src="https://food.seyone.dev/favicon.png"/>
                </div>
            </a>
            <a class="link" href="https://bbq.seyone.dev/" data-tooltip="Seyone BBQ">
                <div class="link-item">
                    <img alt="" src="https://bbq.seyone.dev/logo.svg"/>
                </div>
            </a>
        </div>
    </div>
</div>
</body>
</html>
