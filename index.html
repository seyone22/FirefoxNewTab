<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta content="width=device-width, initial-scale=1.0" name="viewport">
	<meta content="ie=edge" http-equiv="X-UA-Compatible">
	<title>New Tab</title>

	<!-- Link to the external CSS file -->
	<link href="styles.css" rel="stylesheet">
</head>

<body>
<div class="main">

	<!-- First group: Proton services links -->
	<div class="group">
		<a class="link" href="https://mail.proton.me/">
			<div class="link-item">
				<img alt="" src="./assets/protonmail.svg"/>
			</div>
		</a>
		<a class="link" href="https://calendar.proton.me/">
			<div class="link-item">
				<img alt="" src="./assets/protoncalendar.svg"/>
			</div>
		</a>
		<a class="link" href="https://drive.proton.me/">
			<div class="link-item">
				<img alt="" src="./assets/protondrive.svg"/>
			</div>
		</a>
		<a class="link" href="https://pass.proton.me/">
			<div class="link-item">
				<img alt="" src="./assets/protonpass.svg"/>
			</div>
		</a>
		<a class="link" href="https://vpn.proton.me/">
			<div class="link-item">
				<img alt="" src="./assets/protonvpn.svg"/>
			</div>
		</a>
		<a class="link" href="https://wallet.proton.me/">
			<div class="link-item">
				<img alt="" src="./assets/protonwallet.svg"/>
			</div>
		</a>
	</div>

	<!-- Second row of grouped links -->
	<div class="row">

		<!-- Group: Pixiv and Instagram links -->
		<div class="group">
			<a class="link" href="https://www.pixiv.net/">
				<div class="link-item">
					<img alt="" src="./assets/pixiv.svg"/>
				</div>
			</a>
			<a class="link" href="https://www.instagram.com/">
				<div class="link-item">
					<img alt="" src="./assets/instagram.svg"/>
				</div>
			</a>
		</div>

		<!-- Group: Microsoft Office link -->
		<div class="group">
			<a class="link" href="https://www.office.com/?auth=2">
				<div class="link-item">
					<img alt="" src="./assets/office.svg"/>
				</div>
			</a>
		</div>

		<!-- Group: Work Jira, AWS, and Confluence links -->
		<div class="group">
			<a class="link" href="https://uprisedigital.atlassian.net/">
				<div class="link-item">
					<img alt="" src="./assets/jira.svg"/>
				</div>
			</a>
			<a class="link" href="https://uprisedigital.atlassian.net/wiki">
				<div class="link-item">
					<img alt="" src="./assets/confluence.svg"/>
				</div>
			</a>
			<a class="link" href="https://223597091711.signin.aws.amazon.com/console">
				<div class="link-item">
					<img alt="" src="./assets/aws.svg"/>
				</div>
			</a>
			<a class="link" href="https://mail.google.com/mail/u/0/#inbox">
				<div class="link-item">
					<img alt="" src="./assets/gmail-svgrepo-com.svg"/>
				</div>
			</a>
		</div>

	</div>

	<!-- Third row of grouped links -->
	<div class="row">

		<!-- Group: LinkedIn and GitHub links -->
		<div class="group">
			<a class="link" href="https://www.linkedin.com/">
				<div class="link-item">
					<img alt="" src="./assets/linkedin.svg"/>
				</div>
			</a>
			<a class="link" href="https://www.github.com/">
				<div class="link-item">
					<img alt="" class="github" src="./assets/github.svg"/>
				</div>
			</a>
		</div>

		<!-- Group: Anime.lk Jira, Confluence, and Google Drive links -->
		<div class="group">
			<a class="link" href="https://animelk.atlassian.net/">
				<div class="link-item">
					<img alt="" src="./assets/jira.svg"/>
				</div>
			</a>
			<a class="link" href="https://animelk.atlassian.net/wiki">
				<div class="link-item">
					<img alt="" src="./assets/confluence.svg"/>
				</div>
			</a>
			<a class="link" href="https://drive.google.com/drive/folders/1TW6OpLOpAr633bVs_GCPWVa7UO-jOQkj">

		<!-- Group: DSMH Jira, Confluence -->
		<div class="group">
			<a class="link" href="https://dsmh.atlassian.net/">
				<div class="link-item">
					<img alt="" src="./assets/jira.svg"/>
				</div>
			</a>
			<a class="link" href="https://dsmh.atlassian.net/wiki">
				<div class="link-item">
					<img alt="" src="./assets/confluence.svg"/>
				</div>
			</a>
		</div>
	</div>
</div>

</html>
